# A whole-machine spec. configtury compiles this to a NixOS configuration.
# Run:  configtury build examples/homelab.toml
[host]
name = "homelab"
system = "x86_64-linux"
target = "nixos"          # whole OS, not just a user environment

[boot]
loader = "systemd-boot"   # or "grub" (then set device = "/dev/sda")

[packages]
profiles = ["dev-base"]   # system-wide packages

[services]
enable = ["openssh", "tailscale", "docker", "jellyfin"]

[users.jack]
groups = ["wheel", "docker"]

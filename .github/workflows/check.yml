name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Evaluate every host + output without building heavy system closures.
      # This is what catches a broken registry entry or a bad host spec.
      - run: nix flake check --no-build --show-trace

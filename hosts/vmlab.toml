# aarch64-linux host — builds natively inside an OrbStack Linux machine on
# Apple Silicon (no x86 emulation). Used to prove a configtury machine really
# *builds*, not just evaluates.
[host]
name = "vmlab"
system = "aarch64-linux"
target = "nixos"

[boot]
loader = "systemd-boot"

[disk]
device = "/dev/vda"
filesystem = "ext4"

[image]
# sd-aarch64 (Pi SD card) + iso build with plain fs tools — no VM, no KVM.
# qcow/raw install via a VM, so they need a KVM-capable builder.
format = "sd-aarch64"

[packages]
profiles = ["dev-base"]

[services]
enable = ["openssh"]

[users.jack]
groups = ["wheel"]

# NixOS target: the whole machine.
# Build:  nix build .#nixosConfigurations.homelab.config.system.build.toplevel
[host]
name = "homelab"
system = "x86_64-linux"
target = "nixos"

[boot]
loader = "systemd-boot"

[disk]
device = "/dev/vda"       # disko partitions + formats this; fileSystems auto-generated
filesystem = "ext4"

[packages]
profiles = ["dev-base", "ops"]

# Simple on/off services...
[services]
enable = ["tailscale", "docker", "jellyfin"]

# ...and a configured one: every key maps to services.openssh.<key>
[services.openssh]
ports = [22, 2222]
[services.openssh.settings]
PermitRootLogin = "no"
PasswordAuthentication = false

[users.jack]
groups = ["wheel", "docker"]

# Optional: a default install target for `nix run .#deploy-homelab`.
# (You can always override it: nix run .#deploy-homelab -- root@1.2.3.4)
# [deploy]
# target = "root@192.168.1.50"
